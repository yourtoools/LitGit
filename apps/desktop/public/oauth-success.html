    <script>
    "use strict";
    const providerStr = "{{PROVIDER}}".toLowerCase();
    const fullToken = "{{HANDOFF_TOKEN}}";
    const deepLink = "{{DEEP_LINK}}";

    const container = document.getElementById("provider-logo-container");
    if (providerStr.includes("github")) {
      container.innerHTML = icons.github;
    } else if (providerStr.includes("gitlab")) {
      container.innerHTML = icons.gitlab;
    } else if (providerStr.includes("bitbucket")) {
      container.innerHTML = icons.bitbucket;
    } else {
      container.innerHTML = icons.default;
    }

    const statusEl = document.getElementById("status");
    const inputEl = document.getElementById("token-input");

    const setStatus = (message) => {
      if (statusEl) {
        statusEl.textContent = message;
        statusEl.style.opacity = message ? "1" : "0";
      }
    };

    document.getElementById("copy-token")?.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(fullToken);
        inputEl.select();
        setStatus("Token copied to clipboard");
        setTimeout(() => setStatus(""), 2000);
      } catch (error) {
        setStatus("Could not copy token automatically");
      }
    });

    inputEl.addEventListener("click", () => {
      inputEl.select();
    });

    setTimeout(() => {
      window.location.href = deepLink;
    }, 350);
