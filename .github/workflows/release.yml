name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish, for example v0.1.0
        required: true
        type: string
      dry_run:
        description: Build release artifacts without creating a GitHub release
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Ultracite checks
        run: bun run check

      - name: Run type checks
        run: bun run check-types

  release-notes:
    name: Release Notes
    needs: verify
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      body: ${{ steps.format_release_notes.outputs.body }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          configuration: .github/changelog-config.json
          toTag: ${{ github.event_name == 'push' && github.ref_name || github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Format release notes
        id: format_release_notes
        uses: actions/github-script@v8
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        with:
          result-encoding: string
          script: |
            const tagName = process.env.RELEASE_TAG;
            const changelog = process.env.CHANGELOG?.trim() ?? "";
            return [
              `# LitGit Desktop ${tagName}`,
              "",
              "A new desktop release is ready with platform bundles, generated notes, and attached assets.",
              "",
              changelog,
            ].join("\n");

      - name: Write dry-run release notes
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          cat <<'EOF' > release-notes.md
          ${{ steps.format_release_notes.outputs.body }}
          EOF

      - name: Upload dry-run release notes
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v6
        with:
          name: release-notes-preview
          path: release-notes.md
          if-no-files-found: error

  publish-tauri:
    name: Publish Tauri (${{ matrix.name }})
    needs:
      - verify
      - release-notes
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x64
            artifact_name: tauri-bundle-ubuntu-x64
            platform: ubuntu-22.04
            target: ""
            args: ""
            artifact_path: apps/desktop/src-tauri/target/release/bundle
          - name: Windows x64
            artifact_name: tauri-bundle-windows-x64
            platform: windows-latest
            target: ""
            args: ""
            artifact_path: apps/desktop/src-tauri/target/release/bundle

    runs-on: ${{ matrix.platform }}
    env:
      NO_STRIP: ${{ matrix.platform == 'ubuntu-22.04' && 'true' || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install Rust stable
        if: matrix.target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop web bundle
        run: bun run build:desktop-web
        working-directory: apps/desktop

      - name: Verify desktop asset paths
        shell: bash
        run: |
          if grep -E 'src="/assets/|href="/assets/' apps/desktop/dist/index.html; then
            echo "Desktop bundle uses absolute /assets paths, which breaks packaged Tauri apps."
            exit 1
          fi

      - name: Build release bundle
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run && matrix.args == ''
        run: bun run build
        working-directory: apps/desktop

      - name: Build release bundle with target
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run && matrix.args != ''
        run: bun run build -- ${{ matrix.args }}
        working-directory: apps/desktop

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Build and publish release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          releaseName: LitGit Desktop ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          releaseBody: ${{ needs.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
